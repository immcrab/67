<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Pushup Pro Config</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        #viewport { position: relative; flex: 1; background: #000; overflow: hidden; }
        
        /* Video Mirroring Control */
        video, canvas { 
            position: absolute; width: 100%; height: 100%; object-fit: contain; 
        }
        .mirror-on { transform: scaleX(-1); }
        .mirror-off { transform: scaleX(1); }

        /* HUD & Controls */
        .hud { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; }
        .stat { background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid var(--neon); border-radius: 8px; }
        
        .settings-panel { 
            background: #1a1a1a; padding: 20px; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 15px; border-top: 2px solid #333;
        }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        
        select, input[type="range"], input[type="number"] { 
            background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; 
        }

        button { 
            grid-column: span 2; background: var(--neon); color: black; border: none; 
            padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        
        #angle-debug { position: absolute; bottom: 10px; left: 10px; color: var(--neon); font-family: monospace; z-index: 10; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="viewport">
            <div class="hud">
                <div class="stat"><small>REPS</small><br><span id="rep-count">0</span></div>
                <div class="stat"><small>ANGLE</small><br><span id="live-angle">0°</span></div>
            </div>
            
            <div id="angle-debug">Threshold: <span id="thresh-val">90</span>°</div>

            <video id="video" autoplay muted playsinline class="mirror-on"></video>
            <canvas id="output" class="mirror-on"></canvas>
        </div>

        <div class="settings-panel">
            <div class="control-group">
                <label>Camera Source</label>
                <select id="camSelect"><option value="">Loading...</option></select>
            </div>
            <div class="control-group">
                <label>Mirror View</label>
                <select id="mirrorSelect">
                    <option value="mirror-on">On (Selfie)</option>
                    <option value="mirror-off">Off (Back Cam)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Difficulty (Down Angle)</label>
                <input type="range" id="sensRange" min="60" max="120" value="90">
            </div>
            <div class="control-group">
                <label>Goal Reps</label>
                <input type="number" id="goalInput" value="10">
            </div>
            
            <button id="startBtn">START TRACKING</button>
        </div>
    </div>

<script>
    let detector, video, canvas, ctx, currentStream;
    let count = 0, stage = "up", angleHistory = [];
    let downThreshold = 90;

    async function init() {
        video = document.getElementById('video');
        canvas = document.getElementById('output');
        ctx = canvas.getContext('2d');
        
        detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
        
        // Populate Camera List
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        const camSelect = document.getElementById('camSelect');
        camSelect.innerHTML = videoDevices.map(d => `<option value="${d.deviceId}">${d.label || 'Camera '+d.deviceId.slice(0,4)}</option>`).join('');
    }

    async function startCamera(deviceId) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        
        const constraints = {
            video: { 
                deviceId: deviceId ? { exact: deviceId } : undefined,
                width: { ideal: 1280 }, // Attempt higher res for "zoom out" feel
                height: { ideal: 720 }
            }
        };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        
        return new Promise(r => video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            r();
        });
    }

    function getAngle(a, b, c) {
        let ang = Math.abs(Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x)) * 180 / Math.PI;
        return ang > 180 ? 360 - ang : ang;
    }

    async function run() {
        const poses = await detector.estimatePoses(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (poses.length > 0) {
            const kp = poses[0].keypoints;
            
            // Draw Skeleton
            ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 6;
            const connections = [[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12]];
            connections.forEach(([i, j]) => {
                if (kp[i].score > 0.3 && kp[j].score > 0.3) {
                    ctx.beginPath(); ctx.moveTo(kp[i].x, kp[i].y); ctx.lineTo(kp[j].x, kp[j].y); ctx.stroke();
                }
            });

            // Tracking Logic (Best Arm)
            const arm = (kp[7].score > kp[8].score) ? [kp[5], kp[7], kp[9]] : [kp[6], kp[8], kp[10]];
            if (arm[1].score > 0.4) {
                let angle = getAngle(arm[0], arm[1], arm[2]);
                angleHistory.push(angle);
                if (angleHistory.length > 4) angleHistory.shift();
                const avgAngle = angleHistory.reduce((a,b)=>a+b)/angleHistory.length;

                document.getElementById('live-angle').innerText = Math.round(avgAngle) + "°";

                if (avgAngle > 150) stage = "up";
                if (avgAngle < downThreshold && stage === "up") {
                    stage = "down";
                    count++;
                    document.getElementById('rep-count').innerText = count;
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }
        }
        if (count < document.getElementById('goalInput').value) requestAnimationFrame(run);
    }

    // Event Listeners
    document.getElementById('sensRange').addEventListener('input', (e) => {
        downThreshold = e.target.value;
        document.getElementById('thresh-val').innerText = downThreshold;
    });

    document.getElementById('mirrorSelect').addEventListener('change', (e) => {
        video.className = canvas.className = e.target.value;
    });

    document.getElementById('startBtn').addEventListener('click', async () => {
        await startCamera(document.getElementById('camSelect').value);
        count = 0;
        document.getElementById('rep-count').innerText = "0";
        run();
    });

    init();
</script>
</body>
</html>
