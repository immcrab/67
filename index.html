<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Smooth Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
<style>
:root { --neon: #00ff41; --bg: #0a0a0a; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }

.main-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

#video-wrap { position: relative; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 5; }

.hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; }
.stat { background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid var(--neon); border-radius: 4px; }
.stat label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--neon); }
.stat span { font-size: 1.8rem; font-weight: bold; font-family: monospace; }

.progress-container { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 12px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 10px; z-index: 10; }
#progress-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: var(--neon); border-radius: 10px; transition: height 0.1s ease-out; box-shadow: 0 0 15px var(--neon); }

#countdown { position: absolute; font-size: 10rem; font-weight: 900; z-index: 100; pointer-events: none; text-shadow: 0 0 20px #000; }

.controls { background: #1a1a1a; padding: 25px; display: flex; gap: 15px; align-items: center; justify-content: center; z-index: 20; }
input, select { background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 8px; font-size: 1.2rem; }
input { width: 60px; }
button { background: var(--neon); color: black; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
</style>
</head>
<body>

<div class="main-container">
    <div id="video-wrap">
        <div class="hud">
            <div class="stat"><label>Reps</label><span id="rep-count">0</span></div>
            <div class="stat"><label>Status</label><span id="status-text">WAITING</span></div>
        </div>

        <div class="progress-container"><div id="progress-fill"></div></div>
        <div id="countdown"></div>

        <video id="video" autoplay muted playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <div class="controls">
        <label>Goal:<input type="number" id="goal" value="10"></label>
        <label>Camera:<select id="cameraSelect"></select></label>
        <button id="startBtn">START WORKOUT</button>
    </div>
</div>

<script>
let detector, video, canvas, ctx;
let count = 0, stage = "up", goal = 10;
let angleHistory = [];
const CONNECTIONS = [
    ['left_shoulder','right_shoulder'], ['left_shoulder','left_elbow'], ['left_elbow','left_wrist'],
    ['right_shoulder','right_elbow'], ['right_elbow','right_wrist'], ['left_shoulder','left_hip'],
    ['right_shoulder','right_hip'], ['left_hip','right_hip']
];

async function init() {
    video = document.getElementById('video');
    canvas = document.getElementById('output');
    ctx = canvas.getContext('2d');
    detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING });
    await populateCameras();
}

async function populateCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoSelect = document.getElementById('cameraSelect');
    videoSelect.innerHTML = '';
    devices.filter(d => d.kind === 'videoinput').forEach((device,i) => {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.innerText = device.label || `Camera ${i+1}`;
        videoSelect.appendChild(option);
    });
}

async function startCamera() {
    const cameraId = document.getElementById('cameraSelect').value;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: cameraId ? { exact: cameraId } : undefined }, audio: false });
    video.srcObject = stream;
    return new Promise(r => video.onloadedmetadata = () => { 
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        r();
    });
}

function drawSkeleton(keypoints) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.shadowBlur = 10; ctx.shadowColor = "#00ff41";
    ctx.strokeStyle = "#00ff41"; ctx.lineWidth=5; ctx.lineCap="round";
    CONNECTIONS.forEach(([p1n,p2n])=>{
        const p1 = keypoints.find(k=>k.name===p1n), p2 = keypoints.find(k=>k.name===p2n);
        if(p1.score>0.3 && p2.score>0.3){ ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();}
    });
    ctx.shadowBlur=0;
    keypoints.forEach(kp=>{ if(kp.score>0.3){ ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(kp.x,kp.y,4,0,2*Math.PI); ctx.fill(); } });
}

function getAngle(a,b,c){ let ang=Math.abs(Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x))*180/Math.PI; return ang>180?360-ang:ang; }

async function loop() {
    const poses = await detector.estimatePoses(video);
    if(poses.length>0){
        const kp = poses[0].keypoints;
        drawSkeleton(kp);

        const left = [kp[5], kp[7], kp[9]], right = [kp[6], kp[8], kp[10]];
        const arm = (left[1].score>right[1].score)?left:right;
        if(arm[0].score>0.4 && arm[1].score>0.4){
            let rawAngle = getAngle(arm[0], arm[1], arm[2]);
            angleHistory.push(rawAngle); if(angleHistory.length>5) angleHistory.shift();
            const smoothAngle = angleHistory.reduce((a,b)=>a+b)/angleHistory.length;

            let percent = Math.min(Math.max((160-smoothAngle)/70*100,0),100);
            document.getElementById('progress-fill').style.height = percent+"%";

            if(smoothAngle>155) stage="up";
            if(smoothAngle<90 && stage==="up"){ stage="down"; count++; document.getElementById('rep-count').innerText=count; if(navigator.vibrate) navigator.vibrate([40,30,40]); }
            document.getElementById('status-text').innerText = stage.toUpperCase();
        }
    }
    if(count<goal) requestAnimationFrame(loop); else document.getElementById('status-text').innerText="DONE!";
}

document.getElementById('startBtn').addEventListener('click', async ()=>{
    goal = document.getElementById('goal').value;
    count=0; document.getElementById('rep-count').innerText=0;
    await startCamera();

    let cd = 3; const cdDiv=document.getElementById('countdown');
    const timer = setInterval(()=>{ cdDiv.innerText=cd; cd--; if(cd<0){ clearInterval(timer); cdDiv.innerText=""; loop(); } },1000);
});

init();
</script>
</body>
</html>
