<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile AI Pushup Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center; 
            background: #121212; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            padding-bottom: 40px;
        }
        /* Make the container responsive */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            background: #000;
            line-height: 0; /* Removes bottom gap */
        }
        video, canvas {
            width: 100% !important;
            height: auto !important;
        }
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 10;
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1e1e1e;
            padding: 15px 0;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid #4CAF50;
        }
        .controls {
            padding: 20px;
        }
        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 80px;
            font-size: 1rem;
            margin-right: 10px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        #status { font-size: 0.9rem; color: #888; margin-top: 10px; }
        .highlight { color: #4CAF50; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div>REPS: <span id="counter" class="highlight">0</span> / <span id="goalDisplay">10</span></div>
        <div>STATE: <span id="stage" style="color: #ff9800;">UP</span></div>
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="targetPushups" value="10" />
        <button id="startBtn">START</button>
        <p id="status">Waiting for model...</p>
    </div>

    <script>
        let detector;
        const video = document.getElementById('video');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('status');
        
        let count = 0;
        let target = 10;
        let stage = "up";
        let modelLoaded = false;

        async function initModel() {
            try {
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet, 
                    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
                );
                modelLoaded = true;
                statusText.innerText = "Ready! Place phone on floor against a wall.";
            } catch (e) {
                statusText.innerText = "Error: " + e.message;
            }
        }

        async function setupCamera() {
            const constraints = {
                video: {
                    facingMode: "user", // "user" for selfie, "environment" for back
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            
            return new Promise(resolve => {
                video.onloadedmetadata = () => {
                    // Set canvas internal resolution to match video
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve(video);
                };
            });
        }

        function getAngle(p1, p2, p3) {
            let radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        async function runDetection() {
            const poses = await detector.estimatePoses(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (poses.length > 0) {
                const kp = poses[0].keypoints;
                
                // Draw skeleton for feedback
                kp.forEach(k => {
                    if (k.score > 0.3) {
                        ctx.beginPath();
                        ctx.arc(k.x, k.y, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = "#4CAF50";
                        ctx.fill();
                    }
                });

                // Check visibility of key parts (using Right side)
                const s = kp.find(k => k.name === "right_shoulder");
                const e = kp.find(k => k.name === "right_elbow");
                const w = kp.find(k => k.name === "right_wrist");

                if (s.score > 0.3 && e.score > 0.3 && w.score > 0.3) {
                    const angle = getAngle(s, e, w);

                    if (angle > 155) {
                        stage = "up";
                    }
                    if (angle < 95 && stage === "up") {
                        stage = "down";
                        count++;
                        document.getElementById('counter').innerText = count;
                        // Haptic feedback (vibration) if supported
                        if (navigator.vibrate) navigator.vibrate(50); 
                    }
                    document.getElementById('stage').innerText = stage.toUpperCase();
                }
            }

            if (count < target) {
                requestAnimationFrame(runDetection);
            } else {
                statusText.innerText = "WORKOUT COMPLETE!";
                statusText.style.color = "#4CAF50";
            }
        }

        startBtn.addEventListener('click', async () => {
            if (!modelLoaded) return;
            target = parseInt(document.getElementById('targetPushups').value);
            document.getElementById('goalDisplay').innerText = target;
            
            startBtn.style.display = "none";
            await setupCamera();
            runDetection();
        });

        initModel();
    </script>
</body>
</html>
