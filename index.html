<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pushup Counter Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { position: relative; display: inline-block; margin-top: 20px; border-radius: 10px; overflow: hidden; border: 3px solid #4CAF50; }
        canvas { position: absolute; left: 0; top: 0; z-index: 10; }
        video { display: block; background: #000; }
        #stats { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 1.5em; }
        .control-panel { background: #333; padding: 20px; border-radius: 8px; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: none; width: 60px; text-align: center; }
        button { padding: 10px 25px; font-size: 1em; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { color: #aaa; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <h1>Pushup Counter</h1>
    
    <div class="control-panel">
        <input type="number" id="targetPushups" value="10" min="1" />
        <button id="startBtn">Initialize Camera</button>
        <p id="status">Loading AI model...</p>
    </div>

    <div id="stats">
        <div>Progress: <span id="counter" style="color: #4CAF50; font-weight: bold;">0 / 10</span></div>
        <div>Stage: <span id="stage" style="color: #ff9800;">UP</span></div>
    </div>

    <div class="container">
        <video id="video" width="640" height="480" autoplay muted playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script>
        let detector;
        const video = document.getElementById('video');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const counterDisplay = document.getElementById('counter');
        const stageDisplay = document.getElementById('stage');
        const statusText = document.getElementById('status');
        
        let count = 0;
        let target = 0;
        let stage = "up"; // "up" or "down"
        let modelLoaded = false;

        async function init() {
            try {
                // 1. Load Model First
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet, 
                    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
                );
                modelLoaded = true;
                statusText.innerText = "Model Ready. Grant camera access.";
            } catch (e) {
                statusText.innerText = "Error loading model.";
                console.error(e);
            }
        }

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise(resolve => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve(video);
                };
            });
        }

        function getAngle(p1, p2, p3) {
            let radians = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        function drawKeypoints(keypoints) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            keypoints.forEach(keypoint => {
                if (keypoint.score > 0.4) {
                    ctx.beginPath();
                    ctx.arc(keypoint.x, keypoint.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = "#4CAF50";
                    ctx.fill();
                }
            });
        }

        async function runDetection() {
            const poses = await detector.estimatePoses(video);
            
            if (poses.length > 0) {
                const kp = poses[0].keypoints;
                drawKeypoints(kp);

                // We'll use the right side of the body (often better profile for pushups)
                // but you can add logic to detect which side is more visible
                const shoulder = kp.find(k => k.name === "right_shoulder");
                const elbow = kp.find(k => k.name === "right_elbow");
                const wrist = kp.find(k => k.name === "right_wrist");

                // Check confidence score
                if (shoulder.score > 0.4 && elbow.score > 0.4 && wrist.score > 0.4) {
                    const angle = getAngle(shoulder, elbow, wrist);

                    // PUSHUP LOGIC
                    if (angle > 160) {
                        stage = "up";
                    }
                    if (angle < 90 && stage === "up") {
                        stage = "down";
                        count++;
                        updateUI();
                    }
                    stageDisplay.innerText = stage.toUpperCase();
                }
            }

            if (count < target) {
                requestAnimationFrame(runDetection);
            } else {
                statusText.innerText = "Goal Reached! Awesome work.";
                confettiEffect(); 
            }
        }

        function updateUI() {
            counterDisplay.innerText = `${count} / ${target}`;
        }

        function confettiEffect() {
            stageDisplay.innerText = "COMPLETE!";
            stageDisplay.style.color = "#4CAF50";
        }

        startBtn.addEventListener('click', async () => {
            target = parseInt(document.getElementById('targetPushups').value);
            if (!modelLoaded) return;
            
            startBtn.disabled = true;
            statusText.innerText = "Starting...";
            await setupCamera();
            count = 0;
            updateUI();
            runDetection();
        });

        init();
    </script>
</body>
</html>
